# MycoSentinel Mosquitto Configuration
# MQTT Broker for sensor node communication

# Port configuration
listener 1883
protocol mqtt

# WebSocket listener for browser dashboard
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
connection_messages true
log_timestamp true

# Security (open for simulation - restrict for production)
allow_anonymous true

# Message limits
max_keepalive 900
max_inflight_messages 20
max_queued_messages 1000
max_queued_bytes 10485760

# Topic definitions
# mycosentinel/nodes/{id}/data      - Sensor readings
# mycosentinel/nodes/{id}/status    - Node health
# mycosentinel/nodes/{id}/register  - Registration requests
# mycosentinel/commands/{id}        - Command to node
# mycosentinel/gateway/commands     - Broadcast to all nodes
# mycosentinel/system/alerts        - System alerts

# Retain messages for system topics
retain_available true