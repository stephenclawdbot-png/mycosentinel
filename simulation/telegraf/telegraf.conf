# Telegraf Configuration for MycoSentinel
# Subscribes to MQTT topics and writes to InfluxDB

[global_tags]
  app = "mycosentinel"

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 100
  metric_buffer_limit = 1000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false

# Output to InfluxDB 2.x
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "mycosentinel"
  bucket = "sensor-data"

# Input from MQTT
[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_BROKER}:1883"]
  topics = [
    "mycosentinel/nodes/+/data",
  ]
  qos = 1
  connection_timeout = "30s"
  topics_tag = "topic"
  data_format = "json"

  # JSON parsing
  json_time_key = "timestamp"
  json_time_format = "unix"
  
  # Fields to extract
  tag_keys = [
    "node_id",
  ]
  
  json_string_fields = [
    "bioreactor_state",
    "processing_state"
  ]