# MycoSentinel MQTT Broker Configuration
# Place in: ./mosquitto/config/mosquitto.conf

# ==============================================================================
# Basic Settings
# ==============================================================================

# Port for MQTT protocol
listener 1883
protocol mqtt

# Port for WebSocket (browser dashboards)
listener 9001
protocol websockets

# Allow clients to connect
allow_anonymous false

# ==============================================================================
# Persistence
# ==============================================================================

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ==============================================================================
# Authentication
# ==============================================================================

password_file /mosquitto/config/passwd

# Generate passwords with:
#   mosquitto_passwd -c /mosquitto/config/passwd gateway
#   mosquitto_passwd /mosquitto/config/passwd node01
#   mosquitto_passwd /mosquitto/config/passwd node02
#   ...

# ==============================================================================
# Access Control (ACL)
# ==============================================================================

acl_file /mosquitto/config/acl

# Example ACL rules:
# user gateway
# topic readwrite #
#
# user node01
# topic write mycosentinel/nodes/node01/data
# topic write mycosentinel/nodes/node01/status
# topic read mycosentinel/nodes/node01/cmd
# pattern write mycosentinel/nodes/%u/data
#
# pattern read mycosentinel/nodes/%c/cmd

# ==============================================================================
# Message Limits
# ==============================================================================

# Max message size (1MB for image data)
max_packet_size 1048576

# In-flight messages
max_inflight_messages 100
max_keepalive 1200

# Message expiry
# message_expiry_interval 3600

# ==============================================================================
# Bridge to cloud (optional - uncomment and configure for remote monitoring)
# ==============================================================================

# connection cloud
# address cloud.mycosentinel.io:8883
# bridge_protocol_version mqttv50
# bridge_cafile /mosquitto/certs/ca.crt
# bridge_certfile /mosquitto/certs/client.crt
# bridge_keyfile /mosquitto/certs/client.key
# remote_username cloud_user
# remote_password cloud_pass
# remote_clientid gateway-field-01
# 
# topic # both 0 mycosentinel/local/ mycosentinel/
# topic # in 0 alerts/ alerts/

# ==============================================================================
# Performance Tuning
# ==============================================================================

# Increase socket limits for 10+ nodes
max_connections 100

# Queue sizes
max_queued_messages 1000

# ==============================================================================
# Security
# ==============================================================================

# TLS settings (uncomment for production)
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false
# use_identity_as_username false

# ==============================================================================
# Retained Messages
# ==============================================================================

# Purge retained messages older than
# persistent_client_expiration 1d

# ==============================================================================
# Logging Verbosity (use 'debug' for troubleshooting, 'information' normally)
# ==============================================================================

log_type error
log_type warning
log_type information
# log_type debug
# log_type all