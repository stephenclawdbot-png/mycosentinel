# Telegraf Configuration for MycoSentinel
# Reads MQTT data and writes to InfluxDB

[global_tags]
  gateway = "gateway-field-01"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "mycosentinel"
  bucket = "sensor-data"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

# Read MQTT topics from broker
[[inputs.mqtt_consumer]]
  servers = ["${MQTT_BROKER}:1883"]
  
  # Topics to subscribe to
  topics = [
    "mycosentinel/nodes/+/data",
    "mycosentinel/nodes/+/status"
  ]
  
  # QoS level
  qos = 1
  
  # Connection timeout
  connection_timeout = "30s"
  
  # Message format
  data_format = "json"
  
  # JSON parsing configuration
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["node_id"]
  
  # Field specification (extract specific fields)
  json_string_fields = []

# CPU usage
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# Memory
[[inputs.mem]]

# Disk
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# Disk IO
[[inputs.diskio]]

# Network
[[inputs.net]]

# Processes
[[inputs.processes]]

# Swap
[[inputs.swap]]

# System
[[inputs.system]]

# Kernel
[[inputs.kernel]]