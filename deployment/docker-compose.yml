  #     - PEERDNS=auto
  #     - INTERNAL_SUBNET=10.13.13.0
  #   volumes:
  #     - ./wireguard/config:/config
  #   ports:
  #     - "51820:51820/udp"
  #   sysctls:
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   networks:
  #     - mycosentinel-net

# ==============================================================================
# Networks
# ==============================================================================
networks:
  mycosentinel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==============================================================================
# Volumes (persistent data)
# ==============================================================================
volumes:
  influxdb-data:
    driver: local
  grafana-data:
    driver: local
  nodered-data:
    driver: local
  # portainer-data:
  #   driver: local